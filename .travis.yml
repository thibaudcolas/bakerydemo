version: ~> 1.0
dist: bionic
language: minimal
branches:
  only:
    - bakerydemo-thibaudcolas-cron
#   - bakerydemo-thibaudcolas
#   - bakerydemo-thibaudcolas2
#   - bakerydemo-thibaudcolas3
#   - bakerydemo-thibaudcolas4
#   - bakerydemo-thibaudcolas5
install:
- echo 'There is no install step'
script:
- cat requirements/base.txt | grep -v 'wagtail>' | grep -v 'releases.wagtail.io' > base-filtered.txt && mv base-filtered.txt requirements/base.txt
- curl --silent https://releases.wagtail.io/nightly/latest.json 2>&1 | cut -d '"' -f 4 | tee >> requirements/base.txt
deploy:
  - provider: pages
    skip_cleanup: true
    github_token: "$PAGES_GITHUB_API_TOKEN"
    target_branch: bakerydemo-thibaudcolas-nightly
    on:
      branch: bakerydemo-thibaudcolas-cron
